<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Painel de Vendas — Login">
  <title>TupperStore — Login</title>
  <!-- Aplica tema antes do render para evitar flash -->
  <script>(function(){const t=localStorage.getItem('sublime-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

  <!-- Fundo com grade -->
  <div class="login-bg" aria-hidden="true">
    <div class="login-grid"></div>
  </div>

  <!-- Toggle de tema (canto superior direito) -->
  <button class="login-theme-toggle" id="loginThemeToggle" title="Alternar tema" aria-label="Alternar tema">
    <!-- Ícone injetado pelo login.js -->
  </button>

  <!-- Card de login -->
  <div class="login-container">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon" aria-hidden="true">T</div>
        <span class="logo-text">Tupper<strong>Store</strong></span>
      </div>

      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-subtitle">Acesse seu painel de vendas</p>

      <!-- Formulário -->
      <form class="login-form" id="loginForm" novalidate>

        <div class="form-group">
          <label for="usuario">E-mail</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              id="usuario"
              name="usuario"
              placeholder="seu@email.com"
              autocomplete="email"
              autocapitalize="off"
              spellcheck="false"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-password" id="toggleSenha" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Entrar</span>
          <span class="btn-loader" style="display:none">
            <svg class="spinner" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3"
                stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
            </svg>
            Entrando…
          </span>
        </button>
        

      </form>

      <!-- Caixa de erro -->
      <div class="login-error" id="loginError" role="alert" style="display:none"></div>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
